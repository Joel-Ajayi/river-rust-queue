name: Application CI

on:
  push:
    branches: [main]
    paths:
      - "services/go-services/**"
      - "services/rust-services/**"
      - "services/admin-dashboard/**"
      - "api/proto/**"
      - "deploy/db/migrations/**"
  pull_request:
    branches: [main]
    paths:
      - "services/go-services/**"
      - "services/rust-services/**"
      - "services/admin-dashboard/**"
      - "api/proto/**"
      - "deploy/db/migrations/**"

permissions:
  contents: read
  packages: write

jobs:
  go:
    name: Go lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/go-services
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: services/go-services/go.sum

      - name: gofmt check
        run: test -z "$(gofmt -l .)" || { echo "needs gofmt:"; gofmt -l .; exit 1; }

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

  rust:
    name: Rust lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/rust-services
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt check
        run: cargo fmt -- --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test

  buf:
    name: Protobuf lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - name: buf lint
        run: buf lint api/proto
      - name: buf breaking
        if: github.event_name == 'pull_request'
        run: buf breaking api/proto --against '.git#branch=main'

  images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [go, rust, buf]
    # Only push on main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push with Bake
        uses: docker/bake-action@v4
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          TAG: ${{ github.sha }}
        with:
          push: true

  gitops-promote:
    name: Promote to GitOps
    runs-on: ubuntu-latest
    needs: [images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: Joel-Ajayi/rrq-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: rrq-gitops


      - name: Install yq
        run: |
          sudo curl -sL https://github.com/mikefarah/yq/releases/download/v4.45.1/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Update Image Tags
        run: |
          export TAG="${{ github.sha }}"
          cd rrq-gitops/rrq/overlays/prod
          yq -i '.images[].newTag = strenv(TAG)' kustomization.yaml

      - name: Commit and Push
        working-directory: rrq-gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: Update RRQ images to ${{ github.sha }}"
          git push origin main
