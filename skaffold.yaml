apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: river-rust-queue
build:
  local:
    push: false
  artifacts:
    - image: rrq/api-gateway-go
      context: services/go-services
      docker:
        dockerfile: Dockerfile
        buildArgs:
          SERVICE: api-gateway
    - image: rrq/api-gateway-rust
      context: services/rust-services
      docker:
        dockerfile: Dockerfile
        buildArgs:
          SERVICE: api-gateway
    - image: rrq/outbox-relay-go
      context: services/go-services
      docker:
        dockerfile: Dockerfile
        buildArgs:
          SERVICE: outbox-relay
    - image: rrq/ledger-worker-go
      context: services/go-services
      docker:
        dockerfile: Dockerfile
        buildArgs:
          SERVICE: ledger-worker
    - image: rrq/webhook-worker-go
      context: services/go-services
      docker:
        dockerfile: Dockerfile
        buildArgs:
          SERVICE: webhook-worker
    - image: rrq/fraud-worker-go
      context: services/go-services
      docker:
        dockerfile: Dockerfile
        buildArgs:
          SERVICE: fraud-worker
    - image: rrq/recon-worker-go
      context: services/go-services
      docker:
        dockerfile: Dockerfile
        buildArgs:
          SERVICE: recon-worker
    - image: rrq/outbox-relay-rust
      context: services/rust-services
      docker:
        dockerfile: Dockerfile
        buildArgs:
          SERVICE: outbox-relay

    - image: rrq/admin-dashboard
      context: services/admin-dashboard
      docker:
        dockerfile: Dockerfile
    - image: rrq/migrate
      context: deploy/db/migrations
      docker:
        dockerfile: Dockerfile
manifests:
  kustomize:
    paths:
      - ../rrq-gitops/rrq/overlays/dev
deploy:
  kubectl: {}
