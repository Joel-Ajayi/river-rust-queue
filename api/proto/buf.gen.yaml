version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: ../../go-services/internal/gen/proto
plugins:
  # Generates standard Go types/structs
  - remote: buf.build/protocolbuffers/go
    out: ../../go-services/internal/gen/proto
    opt: paths=source_relative

    # Generates the actual Go gRPC server and client code
  - remote: buf.build/grpc/go
    out: ../../go-services/internal/gen/proto
    opt: paths=source_relative

  # native Rust data structures/types
  # - remote: buf.build/tokio-rs/prost
  #   out: ../../rust-services/internal/gen/rust

  # # Generates the type-safe Rust gRPC client/server interfaces (Tonic engine)
  # - remote: buf.build/hyperium/tonic
  #   out: ../../rust-services/internal/gen/rust

# ├── proto/
# │   ├── buf.yaml              <-- lint/breaking configuration
# │   └── user/v1/user.proto    <-- single source-of-truth blueprint
# ├── buf.gen.yaml              <-- The multi-language build script above
# └── gen/                      <-- AUTOMATICALLY GENERATED BY BUF
#     ├── go/                   <-- Go services
#     │   ├── user.pb.go
#     │   └── user_grpc.pb.go
#     └── rust/                 <-- Rust services
#         ├── Cargo.toml
#         └── src/
#             ├── user.v1.rs    <-- Pure, native Rust structs & traits
#             └── tonic.v1.rs
